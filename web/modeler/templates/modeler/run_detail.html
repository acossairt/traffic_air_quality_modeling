{% extends "modeler/base.html" %}
{% load static %}
{% block title %}Run {{ run.pk }}{% endblock %}
{% block content %}
  <h1>Run {{ run.pk }} — {{ run.project.name }}</h1>
  <p>
    <a class="btn" href="{% url 'project_edit' run.project.pk %}">Back to project</a>
    Created {{ run.created_at|date:"Y-m-d H:i:s" }}
  </p>

  <div id="run-status-block">
    <p>Status: <strong id="run-status">{{ run.status }}</strong> <span id="run-spinner"></span></p>
    <p id="run-error" style="color:#b00"></p>
  </div>

  <div id="plots" style="display:none">
    <div id="plot-pops" style="margin:1rem 0"></div>
    <div id="plot-emissions" style="margin:1rem 0"></div>
    <div id="plot-vel" style="margin:1rem 0"></div>
  </div>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script>
    const RUN_PK = {{ run.pk }};
    const STATUS_URL  = `/runs/${RUN_PK}/status`;
    const RESULTS_URL = `/runs/${RUN_PK}/results`;

    const statusEl  = document.querySelector('#run-status');
    const spinnerEl = document.querySelector('#run-spinner');
    const errorEl   = document.querySelector('#run-error');
    const plotsEl   = document.querySelector('#plots');

    let dots = 0;
    function tick() {
      dots = (dots + 1) % 4;
      spinnerEl.textContent = '.'.repeat(dots);
    }

    async function poll() {
      let data;
      try {
        const r = await fetch(STATUS_URL);
        data = await r.json();
      } catch (e) {
        statusEl.textContent = 'connection error';
        return setTimeout(poll, 3000);
      }
      statusEl.textContent = data.status;
      if (data.status === 'completed') {
        spinnerEl.textContent = '';
        await loadAndPlot();
      } else if (data.status === 'failed') {
        spinnerEl.textContent = '';
        errorEl.textContent = data.error || 'unknown error';
      } else {
        tick();
        setTimeout(poll, 1500);
      }
    }

    async function loadAndPlot() {
      const data = await fetch(RESULTS_URL).then(r => r.json());
      plotsEl.style.display = 'block';
      renderPopulations(data);
      renderEmissions(data);
      renderVelocity(data);
    }

    // Build "fromLabel→toLabel" from patch labels so legend strings don't
    // leak DB pks (which are what `key` actually contains).
    function edgeName(d, e) {
      const from = d.patches[String(e.from)]?.label ?? e.from;
      const to   = d.patches[String(e.to)]?.label ?? e.to;
      return `${from}→${to}`;
    }

    // ----- chart 1: patch + corridor populations vs time
    function renderPopulations(d) {
      const traces = [];
      Object.entries(d.patches).forEach(([id, p]) => {
        traces.push({ x: d.time, y: p.np, mode: 'lines', name: `np[${p.label}]`, line: { width: 2.5 } });
      });
      Object.values(d.edges).forEach((e) => {
        traces.push({ x: d.time, y: e.nc, mode: 'lines', name: `nc[${edgeName(d, e)}]`, line: { width: 2 } });
      });
      Plotly.newPlot('plot-pops', traces, {
        title: 'Patch and Corridor Populations',
        xaxis: { title: 'Time (hours)' },
        yaxis: { title: 'Population (number of vehicles)' },
        hovermode: 'x unified',
        height: 460,
        margin: { b: 110 },
        legend: { orientation: 'h', x: 0, y: -0.25, xanchor: 'left', yanchor: 'top' },
      }, { responsive: true });
    }

    // ----- chart 2: corridor counts (left) + emissions (right, in tons)
    function renderEmissions(d) {
      const traces = [];
      Object.values(d.edges).forEach((e) => {
        traces.push({ x: d.time, y: e.nc, mode: 'lines', name: `nc[${edgeName(d, e)}]`, line: { width: 2 } });
      });
      Object.values(d.edges).forEach((e) => {
        traces.push({
          x: d.time, y: e.ec.map(v => v / 1000), mode: 'lines',
          name: `ec[${edgeName(d, e)}] (mt/hr)`, yaxis: 'y2', line: { dash: 'dashdot', width: 2 },
        });
      });
      traces.push({
        x: d.time, y: d.et.map(v => v / 1000), mode: 'lines',
        name: 'total et (mt)', yaxis: 'y2', line: { dash: 'dashdot', width: 2 },
      });
      Plotly.newPlot('plot-emissions', traces, {
        title: 'Corridor Vehicle Counts and Emissions',
        xaxis: { title: 'Time (hours)' },
        yaxis: { title: 'Number of Vehicles in Corridor' },
        yaxis2: { title: 'Emissions (units in legend)', overlaying: 'y', side: 'right' },
        hovermode: 'x unified',
        height: 460,
        margin: { b: 110 },
        legend: { orientation: 'h', x: 0, y: -0.25, xanchor: 'left', yanchor: 'top' },
      }, { responsive: true });
    }

    // ----- chart 3: emissions per vehicle (left) + velocity (right)
    function renderVelocity(d) {
      const traces = [];
      Object.values(d.edges).forEach((e) => {
        const evp = e.ec.map((v, i) => e.nc[i] > 1e-6 ? v / e.nc[i] : 0);
        traces.push({ x: d.time, y: evp, mode: 'lines', name: `ec/nc[${edgeName(d, e)}]`, line: { width: 2 } });
      });
      Object.values(d.edges).forEach((e) => {
        traces.push({
          x: d.time, y: e.v, mode: 'lines',
          name: `v̄[${edgeName(d, e)}]`, yaxis: 'y2', line: { dash: 'dashdot', width: 2 },
        });
      });
      Plotly.newPlot('plot-vel', traces, {
        title: 'Corridor per-Vehicle Emission Rates and Velocity',
        xaxis: { title: 'Time (hours)' },
        yaxis: { title: 'Emission rate per vehicle (kg/hr)' },
        yaxis2: { title: 'Velocity (km/hr)', overlaying: 'y', side: 'right' },
        hovermode: 'x unified',
        height: 460,
        margin: { b: 110 },
        legend: { orientation: 'h', x: 0, y: -0.25, xanchor: 'left', yanchor: 'top' },
      }, { responsive: true });
    }

    poll();
  </script>
{% endblock %}
