<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Traffic Modeler{% endblock %}</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 2rem; max-width: 1200px; }
    h1, h2 { font-weight: 600; }
    nav a { margin-right: 1rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; text-align: left; }
    th { background: #f4f4f4; }
    input[type="text"], input[type="number"], textarea, select {
      padding: 0.3rem; border: 1px solid #ccc; border-radius: 3px; width: 100%; box-sizing: border-box;
    }
    .messages { list-style: none; padding: 0; }
    .messages li { padding: 0.5rem 1rem; border-radius: 4px; margin: 0.25rem 0; }
    .messages li.success { background: #d4edda; color: #155724; }
    .messages li.error { background: #f8d7da; color: #721c24; }
    button, .btn {
      padding: 0.4rem 0.9rem; border: 1px solid #888; background: #fafafa; cursor: pointer;
      border-radius: 4px; text-decoration: none; color: inherit; display: inline-block;
    }
    button.primary, .btn.primary { background: #2563eb; color: white; border-color: #2563eb; }
    button.danger, .btn.danger { background: #dc2626; color: white; border-color: #dc2626; }
    .narrow { width: 6rem; }
    .actions { margin: 1rem 0; }
    fieldset { border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; }
    legend { font-weight: 600; padding: 0 0.5rem; }
  </style>
</head>
<body>
  <nav><a href="{% url 'project_list' %}">Projects</a></nav>
  {% if messages %}
    <ul class="messages">
      {% for m in messages %}<li class="{{ m.tags }}">{{ m }}</li>{% endfor %}
    </ul>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
